baseURL: https://gnutterts.github.io/chesspairing/
title: chesspairing
locale: en-us

module:
  hugoVersion:
    extended: true
    min: 0.110.0
  imports:
    - path: github.com/google/docsy
      disable: false

# Language settings
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

# Taxonomy
taxonomies:
  tag: tags
  category: categories

# Markup and math
markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
            - - $
              - $
        enable: true
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango

# Navigation
menu:
  main:
    - name: Getting Started
      weight: 10
      url: /docs/getting-started/
      identifier: getting-started
    - name: Concepts
      weight: 20
      url: /docs/concepts/
      identifier: concepts
    - name: Pairing Systems
      weight: 30
      url: /docs/pairing-systems/
      identifier: pairing-systems
    - name: Scoring
      weight: 40
      url: /docs/scoring/
      identifier: scoring
    - name: Tiebreakers
      weight: 50
      url: /docs/tiebreakers/
      identifier: tiebreakers
    - name: CLI Reference
      weight: 60
      url: /docs/cli/
      identifier: cli
    - name: Go API
      weight: 70
      url: /docs/api/
      identifier: api
    - name: GitHub
      weight: 100
      url: https://github.com/gnutterts/chesspairing
      identifier: github
      params:
        external: true

# Site params
params:
  copyright: Gert Nutterts
  description: >-
    Chess tournament pairing, scoring, and tiebreaking algorithms.
    Pure Go library implementing FIDE regulations for Swiss, Round-Robin, Keizer, and more.

  # Docsy-specific params
  github_repo: https://github.com/gnutterts/chesspairing
  github_subdir: docs
  github_branch: main

  offlineSearch: true

  ui:
    navbar_logo: false
    sidebar_menu_compact: true
    sidebar_menu_foldable: true
    sidebar_search_disable: false
    breadcrumb_disable: false
    ul_show: 2

  links:
    user:
      - name: GitHub
        url: https://github.com/gnutterts/chesspairing
        icon: fab fa-github
        desc: Source code on GitHub

  # Enable KaTeX math rendering
  katex:
    enable: true
