version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    paths:
      # Compact graph-edge rows in this file are deliberately hand-arranged.
      - algorithm/blossom/blossom_test.go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
